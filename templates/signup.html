<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VigilantAI | Sign Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top, #1e1b4b 0%, #020617 100%);
            min-height: 100vh;
        }
        .glass-container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="text-white flex items-center justify-center p-4">
    <div class="max-w-6xl w-full flex flex-col md:flex-row items-center justify-between gap-10">
        <div class="w-full md:w-3/5 glass-container p-8 md:p-12 rounded-[2.5rem] shadow-2xl">
            <div class="text-center mb-8">
                <h2 class="text-2xl font-bold text-purple-400 mb-1">VigilantAI</h2>
                <p class="text-gray-400 italic text-sm">"Security is a process..."</p>
            </div>

            <form action="/signup" method="POST" class="space-y-4">

                <div class="grid grid-cols-2 gap-4">

                    <div>
                        <label class="block text-xs font-medium text-gray-400 mb-1">First Name *</label>
                        <input type="text" name="first_name" required
                        class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-sm text-white placeholder-gray-400 outline-none focus:border-purple-500 transition">
                    </div>

                    <div>
                        <label class="block text-xs font-medium text-gray-400 mb-1">Last Name *</label>
                        <input type="text" name="last_name" required
                        class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-sm text-white placeholder-gray-400 outline-none focus:border-purple-500 transition">
                    </div>

                </div>

                <div>
                    <label class="block text-xs font-medium text-gray-400 mb-1">Email Address *</label>
                    <input type="email" name="email" required
                    class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-sm text-white placeholder-gray-400 outline-none focus:border-purple-500 transition">
                </div>

                <div>
                    <label class="block text-xs font-medium text-gray-400 mb-1">Create Password *</label>
                    <input 
                        type="password" 
                        name="password" 
                        placeholder="Create Password"
                        required
                        minlength="6"
                        class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-sm text-white placeholder-gray-400 outline-none focus:border-purple-500 transition">
                </div>

                <div>
                    <label class="block text-xs font-medium text-gray-400 mb-1">Security Phone Number *</label>
                    <input type="text" name="phone" required placeholder="+91XXXXXXXXXX"
                    class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-sm text-white placeholder-gray-400 outline-none focus:border-purple-500 transition">
                </div>

                <div>
                    <label class="block text-xs font-medium text-gray-400 mb-1">Telegram Chat ID *</label>
                    <input type="text" name="telegram_chat_id" required placeholder="Enter Telegram Chat ID"
                    class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-sm text-white placeholder-gray-400 outline-none focus:border-purple-500 transition">
                </div>

                <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-purple-600 py-3 rounded-xl font-bold mt-4 hover:opacity-90 transition">
                    Create Account
                </button>

            </form>

            <p class="text-center text-gray-500 text-xs mt-6">
                Already have an account? 
                <a href="/login" class="text-blue-400 font-semibold hover:underline">Sign In</a>
            </p>

        </div>
    </div>
</body>
</html>
