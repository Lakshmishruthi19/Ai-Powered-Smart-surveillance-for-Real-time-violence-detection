<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VigilantAI | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; }
        .glass-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="text-white flex min-h-screen">

    <aside class="w-64 border-r border-white/10 flex flex-col p-6 space-y-8">
        <div class="text-2xl font-bold text-blue-500 mb-4">Vigilant<span class="text-purple-500">AI</span></div>
        
        <nav class="flex-1 space-y-2 text-sm text-gray-400">
            <a href="/dashboard" class="flex items-center space-x-3 p-3 rounded-xl bg-blue-600/10 text-blue-400"><span>📊</span> <span>Dashboard</span></a>
            <p class="text-[10px] uppercase text-gray-600 font-bold pt-6 pb-2">Menu</p>
            <a href="/" class="p-3 block rounded-xl hover:bg-white/5">🏠 Home</a>
            <a href="/features" class="p-3 block rounded-xl hover:bg-white/5">⚡ Features</a>
            <a href="/about" class="p-3 block rounded-xl hover:bg-white/5">📖 About</a>
        </nav>

        <a href="/logout" class="text-red-400 p-3 text-sm">🚪 Logout</a>
    </aside>

    <main class="flex-1 p-8">
        <div class="flex justify-center mb-6">
            <div class="bg-emerald-500/20 border border-emerald-500/40 text-emerald-400 px-4 py-2 rounded-lg text-sm">
                ✅ Account created successfully!
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2">
                <div class="glass-card rounded-3xl overflow-hidden relative">
                    <div class="relative w-full aspect-video bg-black">
                        <img src="{{ url_for('video_feed') }}" alt="Live Stream" class="w-full h-full object-cover">
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
