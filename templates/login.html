<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vigilantview | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top, #1e1b4b 0%, #020617 100%);
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="text-white flex items-center justify-center p-6">

    <div class="max-w-6xl w-full flex flex-col md:flex-row items-center justify-between gap-12">
        
        <div class="w-full md:w-1/2 max-w-md">
            <div class="text-center mb-10">
                <h2 class="text-2xl font-bold text-purple-400 mb-2">VigilantAI</h2>
                <h1 class="text-4xl font-extrabold mb-4">Welcome Back</h1>
                <p class="text-gray-400">Stay connected. Stay informed. Stay safe with VigilantAI.</p>
            </div>

            <form action="/login" method="POST" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Email Address *</label>
                    <input type="email" name="email" required class="w-full bg-white/5 border border-white/10 rounded-xl p-4 outline-none focus:border-purple-500 transition" placeholder="Enter your email">
                </div>

                <div>
                    <div class="flex justify-between mb-2">
                        <label class="text-sm font-medium text-gray-400">Password *</label>
                        <a href="#" class="text-xs text-purple-400 hover:underline">Forgot Password?</a>
                    </div>
                    <input type="password" name="password" required class="w-full bg-white/5 border border-white/10 rounded-xl p-4 outline-none focus:border-purple-500 transition" placeholder="Enter your password">
                </div>

                <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-purple-600 py-4 rounded-xl font-bold hover:opacity-90 transition shadow-lg shadow-purple-500/30">
                    Sign In
                </button>
            </form>

            <p class="text-center text-gray-500 text-sm mt-8">
                Don't have an account? <a href="/signup" class="text-purple-400 font-semibold hover:underline">Sign Up</a>
            </p>
        </div>

        <div class="hidden md:block w-1/2 relative">
            <div class="relative p-4 glass-card rounded-[2.5rem] overflow-hidden">
                <img src="https://yeswe.in/wp-content/uploads/2022/05/ai-in-security-and-surveillance-featured.jpg" 
                     alt="Security Overview" 
                     class="rounded-[2rem] w-full h-[500px] object-cover">
                
                <div class="absolute top-8 right-8 bg-purple-600 p-3 rounded-xl shadow-xl">👁️</div>
                <div class="absolute bottom-8 left-8 bg-pink-600 p-3 rounded-xl shadow-xl">🔒</div>
            </div>
            
            <div class="absolute -z-10 top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-80 h-80 bg-purple-600/20 blur-[100px] rounded-full"></div>
        </div>
    </div>

    </body>
</html>
